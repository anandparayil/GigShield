<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | GigShield</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="auth-page admin-theme">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="logo-dot"></div><span>GigShield Admin</span>
    </div>
    <h2>Admin login</h2>
    <p>Preset admin credentials: <strong>admin1 / admin1</strong></p>
    <form id="adminLoginForm" class="stack-form">
      <input type="text" id="adminPhone" placeholder="Admin mobile (use 9999999999)" required>
      <input type="password" id="adminPassword" placeholder="Password" required>
      <button type="submit" class="btn btn-primary full">Login as admin</button>
    </form>
    <p class="form-message" id="adminLoginMessage"></p>
    <div class="mini-links">
      <a href="/">Back to home</a>
    </div>
  </div>
  <script src="/static/js/common.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
