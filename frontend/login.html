<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker Login | GigShield</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="logo-dot"></div><span>GigShield</span>
    </div>
    <h2>Worker login</h2>
    <p>Login using the mobile number and password you created during registration.</p>
    <form id="userLoginForm" class="stack-form">
      <input type="text" id="loginPhone" placeholder="Mobile number" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit" class="btn btn-primary full">Login</button>
    </form>
    <p class="form-message" id="loginMessage"></p>
    <div class="mini-links">
      <a href="/register">Create new account</a>
      <a href="/">Back to home</a>
    </div>
  </div>
  <script src="/static/js/common.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
